<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cms-primary: #0f1d3d;
      --cms-accent: #c9944a;
      --cms-accent-light: #e4b87a;
      --cms-bg: #f8f9fb;
      --cms-card: #ffffff;
      --cms-border: #e5e7eb;
      --cms-text: #1a1a2e;
      --cms-text-light: #6b7280;
      --cms-text-muted: #9ca3af;
      --cms-success: #10b981;
      --cms-danger: #ef4444;
      --cms-info: #3b82f6;
      --cms-radius: 12px;
      --cms-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --cms-shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
      --font: 'Noto Sans JP', sans-serif;
      --font-en: 'Outfit', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--cms-bg); color: var(--cms-text); line-height: 1.6; }

    /* === LAYOUT === */
    .cms { display: flex; min-height: 100vh; }

    .cms__sidebar {
      width: 260px; background: var(--cms-primary); color: #fff;
      padding: 24px 0; position: fixed; top: 0; left: 0; bottom: 0;
      overflow-y: auto; z-index: 100;
    }
    .cms__sidebar-logo { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
    .cms__sidebar-logo h1 { font-family: var(--font-en); font-size: 18px; font-weight: 700; }
    .cms__sidebar-logo span { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-top: 2px; }

    .cms__nav { list-style: none; }
    .cms__nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 24px;
      color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent;
    }
    .cms__nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.04); }
    .cms__nav-item.active { color: #fff; background: rgba(255,255,255,0.08); border-left-color: var(--cms-accent); }
    .cms__nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .cms__nav-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 12px 24px; }

    .cms__main { flex: 1; margin-left: 260px; padding: 32px; max-width: 960px; }
    .cms__page-header { margin-bottom: 32px; }
    .cms__page-title { font-size: 24px; font-weight: 700; }
    .cms__page-desc { font-size: 14px; color: var(--cms-text-light); margin-top: 4px; }

    /* === CARDS === */
    .cms__card { background: var(--cms-card); border-radius: var(--cms-radius); box-shadow: var(--cms-shadow); padding: 28px; margin-bottom: 20px; }
    .cms__card-title {
      font-size: 16px; font-weight: 700; margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--cms-border); display: flex; align-items: center; gap: 8px;
    }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; background: rgba(201,148,74,0.1); color: var(--cms-accent); }

    /* === FORM === */
    .cms__field { margin-bottom: 20px; }
    .cms__field:last-child { margin-bottom: 0; }
    .cms__label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .cms__label-hint { font-weight: 400; color: var(--cms-text-light); font-size: 12px; margin-left: 8px; }

    .cms__input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--cms-border); border-radius: 8px;
      font-family: var(--font); font-size: 14px; color: var(--cms-text); background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .cms__input:focus { border-color: var(--cms-accent); box-shadow: 0 0 0 3px rgba(201,148,74,0.12); }
    textarea.cms__input { min-height: 100px; resize: vertical; line-height: 1.8; }
    select.cms__input { cursor: pointer; }
    .cms__input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* === DRAG & DROP IMAGE === */
    .cms__dropzone {
      border: 2px dashed var(--cms-border); border-radius: 12px; padding: 32px 20px;
      text-align: center; cursor: pointer; transition: all 0.25s; position: relative;
      background: var(--cms-bg); min-height: 120px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .cms__dropzone:hover, .cms__dropzone.dragover {
      border-color: var(--cms-accent); background: rgba(201,148,74,0.04);
    }
    .cms__dropzone.dragover { transform: scale(1.01); }
    .cms__dropzone-icon { color: var(--cms-text-muted); }
    .cms__dropzone-text { font-size: 13px; color: var(--cms-text-light); }
    .cms__dropzone-text strong { color: var(--cms-accent); }
    .cms__dropzone-hint { font-size: 11px; color: var(--cms-text-muted); }
    .cms__dropzone input[type="file"] { display: none; }

    .cms__dropzone-preview {
      position: relative; display: inline-block; margin-top: 12px; max-width: 100%;
    }
    .cms__dropzone-preview img, .cms__dropzone-preview video {
      max-width: 100%; max-height: 200px; border-radius: 8px; display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .cms__dropzone-remove {
      position: absolute; top: -8px; right: -8px; width: 24px; height: 24px;
      background: var(--cms-danger); color: #fff; border: none; border-radius: 50%;
      cursor: pointer; font-size: 14px; line-height: 1; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(239,68,68,0.3);
    }
    .cms__url-fallback { margin-top: 10px; }
    .cms__url-fallback summary {
      font-size: 12px; color: var(--cms-text-muted); cursor: pointer;
      user-select: none; padding: 4px 0;
    }
    .cms__url-fallback .cms__input { margin-top: 6px; font-size: 12px; }

    /* === COLOR PALETTE === */
    .cms__palette { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cms__palette-swatch {
      width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
      border: 3px solid transparent; transition: all 0.2s; position: relative;
    }
    .cms__palette-swatch:hover { transform: scale(1.15); }
    .cms__palette-swatch.active {
      border-color: var(--cms-text); box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--cms-text);
    }
    .cms__palette-swatch.active::after {
      content: '✓'; position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 14px; font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .cms__color-custom {
      display: flex; align-items: center; gap: 10px; margin-top: 8px;
    }
    .cms__color-custom input[type="color"] {
      width: 40px; height: 36px; border: 1px solid var(--cms-border); border-radius: 8px;
      cursor: pointer; padding: 2px;
    }
    .cms__color-custom input[type="text"] {
      width: 100px; font-family: var(--font-en); font-size: 13px;
    }
    .cms__color-label { font-size: 12px; color: var(--cms-text-light); }

    /* === REPEATER === */
    .cms__repeater-item {
      background: var(--cms-bg); border: 1px solid var(--cms-border); border-radius: 10px;
      padding: 20px; margin-bottom: 12px;
    }
    .cms__repeater-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .cms__repeater-label { font-size: 13px; font-weight: 700; }
    .cms__repeater-remove {
      background: none; border: none; color: var(--cms-danger); font-size: 12px;
      font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s;
    }
    .cms__repeater-remove:hover { background: rgba(239,68,68,0.08); }

    .cms__add-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
      border: 2px dashed var(--cms-border); border-radius: 10px; background: none;
      color: var(--cms-text-light); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; width: 100%; justify-content: center;
    }
    .cms__add-btn:hover { border-color: var(--cms-accent); color: var(--cms-accent); background: rgba(201,148,74,0.04); }

    /* === ACTIONS === */
    .cms__actions {
      position: fixed; bottom: 0; left: 260px; right: 0; background: #fff;
      border-top: 1px solid var(--cms-border); padding: 16px 32px;
      display: flex; gap: 12px; justify-content: flex-end; z-index: 50;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    }
    .cms__btn {
      padding: 10px 28px; border: none; border-radius: 100px; font-family: var(--font);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .cms__btn--primary { background: var(--cms-accent); color: #fff; box-shadow: 0 2px 12px rgba(201,148,74,0.3); }
    .cms__btn--primary:hover { background: var(--cms-accent-light); transform: translateY(-1px); }
    .cms__btn--secondary { background: var(--cms-primary); color: #fff; }
    .cms__btn--secondary:hover { opacity: 0.9; }
    .cms__btn--outline { background: #fff; color: var(--cms-text); border: 1px solid var(--cms-border); }
    .cms__btn--outline:hover { border-color: var(--cms-text-light); }

    .cms__toast {
      position: fixed; top: 24px; right: 24px; padding: 14px 24px; border-radius: 10px;
      font-size: 14px; font-weight: 600; z-index: 9999;
      transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: var(--cms-shadow-lg);
    }
    .cms__toast.is-visible { transform: translateX(0); }
    .cms__toast--success { background: var(--cms-success); color: #fff; }
    .cms__toast--error { background: var(--cms-danger); color: #fff; }

    .cms__note {
      background: rgba(201,148,74,0.08); border: 1px solid rgba(201,148,74,0.2);
      border-radius: 10px; padding: 14px 20px; font-size: 13px; color: #8b6914;
      margin-bottom: 24px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.7;
    }
    .cms__note-blue {
      background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.2); color: #1e40af;
    }

    @media (max-width: 768px) {
      .cms__sidebar { width: 100%; position: relative; padding: 16px 0; }
      .cms__main { margin-left: 0; padding: 20px; }
      .cms__actions { left: 0; }
      .cms__input-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="cms">
  <aside class="cms__sidebar">
    <div class="cms__sidebar-logo">
      <h1>CMS Admin</h1>
      <span>コーポレートテンプレート管理</span>
    </div>
    <ul class="cms__nav" id="cmsNav">
      <li class="cms__nav-item active" data-page="site">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        サイト基本設定
      </li>
      <li class="cms__nav-item" data-page="theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        テーマ・配色
      </li>
      <div class="cms__nav-divider"></div>
      <li class="cms__nav-item" data-page="hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        ヒーロー
      </li>
      <li class="cms__nav-item" data-page="news">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        お知らせ
      </li>
      <li class="cms__nav-item" data-page="message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        メッセージ
      </li>
      <li class="cms__nav-item" data-page="service">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        サービス
      </li>
      <li class="cms__nav-item" data-page="photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        職場風景
      </li>
      <li class="cms__nav-item" data-page="access">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        アクセス
      </li>
      <div class="cms__nav-divider"></div>
      <li class="cms__nav-item" data-page="meta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        SEO / メタ情報
      </li>
      <li class="cms__nav-item" data-page="export">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        エクスポート
      </li>
    </ul>
  </aside>

  <main class="cms__main" id="cmsMain"></main>

  <div class="cms__actions">
    <button class="cms__btn cms__btn--outline" onclick="resetData()">リセット</button>
    <button class="cms__btn cms__btn--secondary" onclick="previewSite()">プレビュー</button>
    <button class="cms__btn cms__btn--primary" onclick="saveData()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      保存 &amp; ダウンロード
    </button>
  </div>
</div>
<div class="cms__toast" id="toast"></div>

<script>
// ==========================================
// STATE
// ==========================================
let config = {};
let content = {};
let imageStore = {}; // key: fieldPath, value: { dataUrl, filename }

// ==========================================
// COLOR PALETTES
// ==========================================
const PALETTES = {
  primary: [
    '#0f1d3d','#1a1a2e','#16213e','#0a1628','#1b2838',
    '#2d3436','#0c2461','#192a56','#273c75','#40407a',
    '#2f3640','#353b48','#1e272e','#485460','#0a3d62',
    '#3c6382','#60a3bc','#6a89cc','#4a69bd','#1e3799'
  ],
  accent: [
    '#c9944a','#e4b87a','#d4a76a','#b8860b','#daa520',
    '#cd853f','#e67e22','#f39c12','#d35400','#e74c3c',
    '#c0392b','#27ae60','#2ecc71','#3498db','#2980b9',
    '#8e44ad','#9b59b6','#1abc9c','#16a085','#f1c40f'
  ]
};

// ==========================================
// INIT
// ==========================================
async function init() {
  try {
    config = await fetch('config.json').then(r => r.json());
    content = await fetch('content.json').then(r => r.json());
  } catch (e) {
    config = defaultConfig();
    content = defaultContent();
  }
  // Ensure meta fields exist
  if (!config.meta) config.meta = { description: '', ogImage: '' };
  if (!config.site.logoUrl) config.site.logoUrl = '';
  if (!config.theme.heroBackground) config.theme.heroBackground = '';
  if (!config.theme.heroVideo) config.theme.heroVideo = '';
  if (!config.theme.heroType) config.theme.heroType = 'gradient';

  renderCurrentPage();
  initNav();
}

function defaultConfig() {
  return {
    site: { title: '', tagline: '', phone: '', contactUrl: '', recruitUrl: '', copyright: '', logoUrl: '' },
    theme: { primaryColor: '#0f1d3d', primaryLight: '#1e3a6e', accentColor: '#c9944a', textColor: '#1a1a2e', textLight: '#6b7280', bgColor: '#ffffff', bgLight: '#f5f5f5', bgDark: '#0f1d3d', heroBackground: '', heroVideo: '', heroType: 'gradient' },
    meta: { description: '', ogImage: '' },
    nav: [], footer: { links: [] }
  };
}

function defaultContent() {
  return {
    hero: { image: '' },
    news: { titleEn: 'NEWS', titleJa: '最新情報', listUrl: '/news/', items: [] },
    message: { titleEn: 'MESSAGE', titleJa: 'メッセージ', image: '', heading: '', body: '', values: [], buttons: [] },
    service: { titleEn: 'SERVICE', titleJa: 'サービス', items: [] },
    photo: { titleEn: 'PHOTO', titleJa: '職場風景', images: [] },
    access: { titleEn: 'ACCESS', titleJa: 'アクセス', offices: [], note: '' }
  };
}

// ==========================================
// NAV
// ==========================================
function initNav() {
  document.querySelectorAll('.cms__nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.cms__nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      renderCurrentPage();
    });
  });
}

function getCurrentPage() {
  return document.querySelector('.cms__nav-item.active')?.dataset.page || 'site';
}

function renderCurrentPage() {
  const page = getCurrentPage();
  const main = document.getElementById('cmsMain');
  const R = { site: pgSite, theme: pgTheme, hero: pgHero, news: pgNews, message: pgMessage, service: pgService, photo: pgPhoto, access: pgAccess, meta: pgMeta, export: pgExport };
  main.innerHTML = '';
  if (R[page]) R[page](main);
  // Re-init dropzones
  setTimeout(initDropzones, 50);
}

// ==========================================
// DROPZONE SYSTEM
// ==========================================
function dropzoneHTML(fieldPath, currentValue, opts = {}) {
  const accept = opts.accept || 'image/*';
  const label = opts.label || '画像をドラッグ＆ドロップ';
  const hint = opts.hint || 'PNG, JPG, WebP';
  const isVideo = accept.includes('video');
  const stored = imageStore[fieldPath];
  const previewSrc = stored ? stored.dataUrl : currentValue;
  const hasPreview = previewSrc && previewSrc.length > 0;

  return `
    <div class="cms__dropzone" data-field="${esc(fieldPath)}" data-accept="${accept}">
      <input type="file" accept="${accept}">
      ${hasPreview ? `
        <div class="cms__dropzone-preview">
          ${isVideo && previewSrc ? `<video src="${esc(previewSrc)}" muted autoplay loop playsinline style="max-height:200px;border-radius:8px;"></video>`
            : `<img src="${esc(previewSrc)}" alt="preview">`}
          <button class="cms__dropzone-remove" onclick="clearDropzone('${esc(fieldPath)}')">×</button>
        </div>
      ` : `
        <div class="cms__dropzone-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="cms__dropzone-text"><strong>クリック</strong>または${label}</p>
        <p class="cms__dropzone-hint">${hint}</p>
      `}
    </div>
    <details class="cms__url-fallback">
      <summary>URLを直接入力する</summary>
      <input class="cms__input" type="text" value="${esc(currentValue || '')}"
        onchange="setNestedValue('${esc(fieldPath)}', this.value); renderCurrentPage();"
        placeholder="https://example.com/image.jpg">
    </details>`;
}

function initDropzones() {
  document.querySelectorAll('.cms__dropzone').forEach(zone => {
    const input = zone.querySelector('input[type="file"]');
    const field = zone.dataset.field;

    zone.addEventListener('click', (e) => {
      if (e.target.closest('.cms__dropzone-remove')) return;
      input.click();
    });

    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file, field);
    });

    input.addEventListener('change', () => {
      if (input.files[0]) handleFile(input.files[0], field);
    });
  });
}

function handleFile(file, fieldPath) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    imageStore[fieldPath] = { dataUrl, filename: file.name };
    setNestedValue(fieldPath, dataUrl);
    renderCurrentPage();
    showToast(`${file.name} を設定しました`, 'success');
  };
  reader.readAsDataURL(file);
}

function clearDropzone(fieldPath) {
  delete imageStore[fieldPath];
  setNestedValue(fieldPath, '');
  renderCurrentPage();
}

function setNestedValue(path, value) {
  const parts = path.split('.');
  const root = parts[0] === 'config' ? config : content;
  let obj = root;
  for (let i = 1; i < parts.length - 1; i++) {
    const key = isNaN(parts[i]) ? parts[i] : parseInt(parts[i]);
    obj = obj[key];
  }
  const lastKey = isNaN(parts[parts.length - 1]) ? parts[parts.length - 1] : parseInt(parts[parts.length - 1]);
  obj[lastKey] = value;
}

// ==========================================
function paletteHTML(configKey, currentValue, paletteType) {
  const colors = PALETTES[paletteType] || PALETTES.primary;
  return `
    <div class="cms__palette" data-key="${configKey}">
      ${colors.map(c => `
        <div class="cms__palette-swatch ${c === currentValue ? 'active' : ''}"
          style="background:${c}" data-color="${c}"
          onclick="setPaletteColor('${configKey}', '${c}', this)"></div>
      `).join('')}
    </div>
    <div class="cms__color-custom">
      <input type="color" value="${currentValue}" onchange="setPaletteColorCustom('${configKey}', this.value, this)">
      <input class="cms__input" type="text" value="${currentValue}" style="width:100px"
        onchange="setPaletteColorCustom('${configKey}', this.value, this)">
      <span class="cms__color-label">カスタム</span>
    </div>`;
}

function setPaletteColor(key, color, el) {
  config.theme[key] = color;
  el.closest('.cms__card').querySelectorAll('.cms__palette-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  const custom = el.closest('.cms__card').querySelector('.cms__color-custom');
  custom.querySelector('input[type="color"]').value = color;
  custom.querySelector('input[type="text"]').value = color;
}

function setPaletteColorCustom(key, color, el) {
  config.theme[key] = color;
  const card = el.closest('.cms__card');
  card.querySelectorAll('.cms__palette-swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === color);
  });
  const custom = card.querySelector('.cms__color-custom');
  custom.querySelector('input[type="color"]').value = color;
  custom.querySelector('input[type="text"]').value = color;
}

    <div class="cms__note cms__note-blue">📦 Base64の画像データが含まれている場合、JSONファイルが大きくなります。本番環境では画像をサーバーにアップしてURLに差し替えてください。</div>
    <div class="cms__card">
      <div class="cms__card-title">config.json <span class="badge">サイト設定</span></div>
      <pre style="background:#f0f2f5;padding:16px;border-radius:8px;font-size:11px;overflow-x:auto;max-height:300px;font-family:'Outfit',monospace;line-height:1.5">${esc(JSON.stringify(config, null, 2))}</pre>
      <br><button class="cms__btn cms__btn--outline" onclick="downloadJSON('config.json',config)">ダウンロード</button>
    </div>
    <div class="cms__card">
      <div class="cms__card-title">content.json <span class="badge">コンテンツ</span></div>
      <pre style="background:#f0f2f5;padding:16px;border-radius:8px;font-size:11px;overflow-x:auto;max-height:300px;font-family:'Outfit',monospace;line-height:1.5">${esc(JSON.stringify(content, null, 2))}</pre>
      <br><button class="cms__btn cms__btn--outline" onclick="downloadJSON('content.json',content)">ダウンロード</button>
    </div>`;
}

// ==========================================
// REPEATER HELPER
// ==========================================
function repeaterItem(label, index, innerHTML, removeAction) {
  return `<div class="cms__repeater-item">
    <div class="cms__repeater-header">
      <span class="cms__repeater-label">${label} ${index + 1}</span>
      <button class="cms__repeater-remove" onclick="${removeAction};renderCurrentPage()">削除</button>
    </div>
    ${innerHTML}
  </div>`;
}

function removeItem(arr, i) { arr.splice(i, 1); }

// ==========================================
// ACTIONS
// ==========================================
function saveData() {
  downloadJSON('config.json', config);
  setTimeout(() => downloadJSON('content.json', content), 300);
  showToast('JSONファイルをダウンロードしました！', 'success');
}

function resetData() {
  if (confirm('変更をリセットしますか？')) { imageStore = {}; init(); showToast('リセットしました', 'success'); }
}

function previewSite() { window.open('index.html', '_blank'); }

function downloadJSON(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `cms__toast cms__toast--${type} is-visible`;
  setTimeout(() => t.classList.remove('is-visible'), 3000);
}

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
