<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS管理画面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cms-primary: #0f1d3d;
      --cms-accent: #c9944a;
      --cms-accent-light: #e4b87a;
      --cms-bg: #f8f9fb;
      --cms-card: #ffffff;
      --cms-border: #e5e7eb;
      --cms-text: #1a1a2e;
      --cms-text-light: #6b7280;
      --cms-success: #10b981;
      --cms-danger: #ef4444;
      --cms-radius: 12px;
      --cms-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --cms-shadow-lg: 0 10px 40px rgba(0,0,0,0.08);
      --font: 'Noto Sans JP', sans-serif;
      --font-en: 'Outfit', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--cms-bg);
      color: var(--cms-text);
      line-height: 1.6;
    }

    /* Layout */
    .cms {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .cms__sidebar {
      width: 260px;
      background: var(--cms-primary);
      color: #fff;
      padding: 24px 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }

    .cms__sidebar-logo {
      padding: 0 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
    }

    .cms__sidebar-logo h1 {
      font-family: var(--font-en);
      font-size: 18px;
      font-weight: 700;
    }

    .cms__sidebar-logo span {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      display: block;
      margin-top: 2px;
    }

    .cms__nav {
      list-style: none;
    }

    .cms__nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .cms__nav-item:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.04);
    }

    .cms__nav-item.active {
      color: #fff;
      background: rgba(255,255,255,0.08);
      border-left-color: var(--cms-accent);
    }

    .cms__nav-item svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .cms__nav-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 24px;
    }

    /* Main content */
    .cms__main {
      flex: 1;
      margin-left: 260px;
      padding: 32px;
      max-width: 960px;
    }

    .cms__page-header {
      margin-bottom: 32px;
    }

    .cms__page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--cms-text);
    }

    .cms__page-desc {
      font-size: 14px;
      color: var(--cms-text-light);
      margin-top: 4px;
    }

    /* Cards */
    .cms__card {
      background: var(--cms-card);
      border-radius: var(--cms-radius);
      box-shadow: var(--cms-shadow);
      padding: 28px;
      margin-bottom: 20px;
    }

    .cms__card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--cms-text);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--cms-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cms__card-title .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(201,148,74,0.1);
      color: var(--cms-accent);
    }

    /* Form elements */
    .cms__field {
      margin-bottom: 20px;
    }

    .cms__field:last-child {
      margin-bottom: 0;
    }

    .cms__label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--cms-text);
      margin-bottom: 6px;
    }

    .cms__label-hint {
      font-weight: 400;
      color: var(--cms-text-light);
      font-size: 12px;
      margin-left: 8px;
    }

    .cms__input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--cms-border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--cms-text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .cms__input:focus {
      border-color: var(--cms-accent);
      box-shadow: 0 0 0 3px rgba(201,148,74,0.12);
    }

    .cms__input--color {
      padding: 4px;
      width: 60px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
    }

    .cms__color-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cms__color-group .cms__input--text {
      flex: 1;
      font-family: var(--font-en);
      font-size: 13px;
    }

    textarea.cms__input {
      min-height: 100px;
      resize: vertical;
      line-height: 1.8;
    }

    .cms__input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Repeater (for lists like news, services, offices) */
    .cms__repeater-item {
      background: var(--cms-bg);
      border: 1px solid var(--cms-border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
    }

    .cms__repeater-item .cms__repeater-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .cms__repeater-item .cms__repeater-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--cms-text);
    }

    .cms__repeater-remove {
      background: none;
      border: none;
      color: var(--cms-danger);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .cms__repeater-remove:hover {
      background: rgba(239,68,68,0.08);
    }

    .cms__add-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: 2px dashed var(--cms-border);
      border-radius: 10px;
      background: none;
      color: var(--cms-text-light);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }

    .cms__add-btn:hover {
      border-color: var(--cms-accent);
      color: var(--cms-accent);
      background: rgba(201,148,74,0.04);
    }

    /* Action buttons */
    .cms__actions {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      background: #fff;
      border-top: 1px solid var(--cms-border);
      padding: 16px 32px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      z-index: 50;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
    }

    .cms__btn {
      padding: 10px 28px;
      border: none;
      border-radius: 100px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .cms__btn--primary {
      background: var(--cms-accent);
      color: #fff;
      box-shadow: 0 2px 12px rgba(201,148,74,0.3);
    }

    .cms__btn--primary:hover {
      background: var(--cms-accent-light);
      transform: translateY(-1px);
    }

    .cms__btn--secondary {
      background: var(--cms-primary);
      color: #fff;
    }

    .cms__btn--secondary:hover {
      opacity: 0.9;
    }

    .cms__btn--outline {
      background: #fff;
      color: var(--cms-text);
      border: 1px solid var(--cms-border);
    }

    .cms__btn--outline:hover {
      border-color: var(--cms-text-light);
    }

    /* Toast */
    .cms__toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--cms-shadow-lg);
    }

    .cms__toast.is-visible {
      transform: translateX(0);
    }

    .cms__toast--success {
      background: var(--cms-success);
      color: #fff;
    }

    .cms__toast--error {
      background: var(--cms-danger);
      color: #fff;
    }

    /* Page sections (hidden by default) */
    .cms__page {
      display: none;
      padding-bottom: 80px;
    }

    .cms__page.active {
      display: block;
    }

    /* Preview tag */
    .cms__preview-note {
      background: rgba(201,148,74,0.08);
      border: 1px solid rgba(201,148,74,0.2);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 13px;
      color: var(--cms-accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .cms__sidebar {
        width: 100%;
        position: relative;
        padding: 16px 0;
      }
      .cms__main {
        margin-left: 0;
        padding: 20px;
      }
      .cms__actions {
        left: 0;
      }
      .cms__input-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="cms">
    <!-- Sidebar -->
    <aside class="cms__sidebar">
      <div class="cms__sidebar-logo">
        <h1>CMS Admin</h1>
        <span>コーポレートテンプレート管理</span>
      </div>
      <ul class="cms__nav" id="cmsNav">
        <li class="cms__nav-item active" data-page="site">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          サイト基本設定
        </li>
        <li class="cms__nav-item" data-page="theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          テーマ・配色
        </li>
        <div class="cms__nav-divider"></div>
        <li class="cms__nav-item" data-page="hero">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          ヒーロー
        </li>
        <li class="cms__nav-item" data-page="news">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
          お知らせ (NEWS)
        </li>
        <li class="cms__nav-item" data-page="message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          メッセージ
        </li>
        <li class="cms__nav-item" data-page="service">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          サービス
        </li>
        <li class="cms__nav-item" data-page="photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          職場風景 (PHOTO)
        </li>
        <li class="cms__nav-item" data-page="access">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          アクセス
        </li>
        <div class="cms__nav-divider"></div>
        <li class="cms__nav-item" data-page="export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          エクスポート
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="cms__main" id="cmsMain"></main>

    <!-- Action bar -->
    <div class="cms__actions">
      <button class="cms__btn cms__btn--outline" onclick="resetData()">リセット</button>
      <button class="cms__btn cms__btn--secondary" onclick="previewSite()">プレビュー</button>
      <button class="cms__btn cms__btn--primary" onclick="saveData()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        保存 &amp; ダウンロード
      </button>
    </div>
  </div>

  <!-- Toast -->
  <div class="cms__toast" id="toast"></div>

  <script>
    // ==========================================
    // State
    // ==========================================
    let config = {};
    let content = {};

    // ==========================================
    // Init
    // ==========================================
    async function init() {
      try {
        config = await fetch('config.json').then(r => r.json());
        content = await fetch('content.json').then(r => r.json());
      } catch (e) {
        // Defaults if files not found
        config = getDefaultConfig();
        content = getDefaultContent();
      }
      renderCurrentPage();
      initNav();
    }

    function getDefaultConfig() {
      return {
        site: { title: '', tagline: '', phone: '', contactUrl: '', recruitUrl: '', copyright: '' },
        theme: { primaryColor: '#0f1d3d', primaryLight: '#1e3a6e', accentColor: '#c9944a', textColor: '#1a1a2e', bgColor: '#ffffff' },
        nav: [],
        footer: { links: [] }
      };
    }

    function getDefaultContent() {
      return {
        hero: { image: '' },
        news: { titleEn: 'NEWS', titleJa: '最新情報', listUrl: '/news/', items: [] },
        message: { titleEn: 'MESSAGE', titleJa: 'メッセージ', image: '', heading: '', body: '', values: [], buttons: [] },
        service: { titleEn: 'SERVICE', titleJa: 'サービス', items: [] },
        photo: { titleEn: 'PHOTO', titleJa: '職場風景', images: [] },
        access: { titleEn: 'ACCESS', titleJa: 'アクセス', offices: [], note: '' }
      };
    }

    // ==========================================
    // Navigation
    // ==========================================
    function initNav() {
      document.querySelectorAll('.cms__nav-item').forEach(item => {
        item.addEventListener('click', () => {
          document.querySelectorAll('.cms__nav-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          renderCurrentPage();
        });
      });
    }

    function getCurrentPage() {
      const active = document.querySelector('.cms__nav-item.active');
      return active ? active.dataset.page : 'site';
    }

    function renderCurrentPage() {
      const page = getCurrentPage();
      const main = document.getElementById('cmsMain');
      const renderers = {
        site: renderSitePage,
        theme: renderThemePage,
        hero: renderHeroPage,
        news: renderNewsPage,
        message: renderMessagePage,
        service: renderServicePage,
        photo: renderPhotoPage,
        access: renderAccessPage,
        export: renderExportPage
      };
      main.innerHTML = '';
      if (renderers[page]) renderers[page](main);
    }

    // ==========================================
    // Page Renderers
    // ==========================================

    function renderSitePage(el) {
      el.innerHTML = `
        <div class="cms__page-header">
          <h2 class="cms__page-title">サイト基本設定</h2>
          <p class="cms__page-desc">サイト名、連絡先、ナビゲーションの設定</p>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">基本情報</div>
          <div class="cms__field">
            <label class="cms__label">サイト名</label>
            <input class="cms__input" type="text" value="${esc(config.site.title)}" onchange="config.site.title=this.value">
          </div>
          <div class="cms__field">
            <label class="cms__label">キャッチコピー</label>
            <input class="cms__input" type="text" value="${esc(config.site.tagline)}" onchange="config.site.tagline=this.value">
          </div>
          <div class="cms__input-row">
            <div class="cms__field">
              <label class="cms__label">電話番号</label>
              <input class="cms__input" type="text" value="${esc(config.site.phone)}" onchange="config.site.phone=this.value">
            </div>
            <div class="cms__field">
              <label class="cms__label">お問い合わせURL</label>
              <input class="cms__input" type="text" value="${esc(config.site.contactUrl)}" onchange="config.site.contactUrl=this.value">
            </div>
          </div>
          <div class="cms__input-row">
            <div class="cms__field">
              <label class="cms__label">採用情報URL</label>
              <input class="cms__input" type="text" value="${esc(config.site.recruitUrl)}" onchange="config.site.recruitUrl=this.value">
            </div>
            <div class="cms__field">
              <label class="cms__label">コピーライト</label>
              <input class="cms__input" type="text" value="${esc(config.site.copyright)}" onchange="config.site.copyright=this.value">
            </div>
          </div>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">ナビゲーション</div>
          <div id="navRepeater">${config.nav.map((n, i) => navItemHTML(n, i)).join('')}</div>
          <button class="cms__add-btn" onclick="addNavItem()">＋ ナビ項目を追加</button>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">フッターリンク</div>
          <div id="footerRepeater">${config.footer.links.map((l, i) => footerLinkHTML(l, i)).join('')}</div>
          <button class="cms__add-btn" onclick="addFooterLink()">＋ リンクを追加</button>
        </div>
      `;
    }

    function renderThemePage(el) {
      const t = config.theme;
      el.innerHTML = `
        <div class="cms__page-header">
          <h2 class="cms__page-title">テーマ・配色</h2>
          <p class="cms__page-desc">カラーテーマとフォントの設定</p>
        </div>
        <div class="cms__preview-note">
          💡 色を変更すると、サイト全体のテーマカラーが一括で変わります
        </div>
        <div class="cms__card">
          <div class="cms__card-title">メインカラー</div>
          ${colorField('プライマリーカラー', 'primaryColor', t.primaryColor)}
          ${colorField('プライマリー（ライト）', 'primaryLight', t.primaryLight)}
          ${colorField('アクセントカラー', 'accentColor', t.accentColor)}
        </div>
        <div class="cms__card">
          <div class="cms__card-title">テキスト・背景</div>
          ${colorField('テキストカラー', 'textColor', t.textColor)}
          ${colorField('テキスト（サブ）', 'textLight', t.textLight || '#6b7280')}
          ${colorField('背景色', 'bgColor', t.bgColor)}
          ${colorField('背景色（セクション）', 'bgLight', t.bgLight || '#f5f5f5')}
          ${colorField('ダーク背景', 'bgDark', t.bgDark || '#0f1d3d')}
        </div>
      `;
    }

    function renderHeroPage(el) {
      el.innerHTML = `
        <div class="cms__page-header">
          <h2 class="cms__page-title">ヒーローセクション</h2>
          <p class="cms__page-desc">メインビジュアルの画像設定</p>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">ヒーロー画像</div>
          <div class="cms__field">
            <label class="cms__label">画像URL</label>
            <input class="cms__input" type="text" value="${esc(content.hero.image)}" onchange="content.hero.image=this.value">
          </div>
        </div>
      `;
    }

    function renderNewsPage(el) {
      const n = content.news;
      el.innerHTML = `
        <div class="cms__page-header">
          <h2 class="cms__page-title">お知らせ (NEWS)</h2>
          <p class="cms__page-desc">最新情報セクションの管理</p>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">セクション設定</div>
          <div class="cms__input-row">
            <div class="cms__field">
              <label class="cms__label">英語タイトル</label>
              <input class="cms__input" type="text" value="${esc(n.titleEn)}" onchange="content.news.titleEn=this.value">
            </div>
            <div class="cms__field">
              <label class="cms__label">日本語タイトル</label>
              <input class="cms__input" type="text" value="${esc(n.titleJa)}" onchange="content.news.titleJa=this.value">
            </div>
          </div>
          <div class="cms__field">
            <label class="cms__label">一覧ページURL</label>
            <input class="cms__input" type="text" value="${esc(n.listUrl)}" onchange="content.news.listUrl=this.value">
          </div>
        </div>
        <div class="cms__card">
          <div class="cms__card-title">お知らせ一覧</div>
          <div id="newsRepeater">${n.items.map((item, i) => newsItemHTML(item, i)).join('')}</div>

    // ==========================================
    // Repeater Actions
    // ==========================================
    function addNavItem() { config.nav.push({ label: '', href: '#' }); renderCurrentPage(); }
    function removeNavItem(i) { config.nav.splice(i, 1); renderCurrentPage(); }
    function addFooterLink() { config.footer.links.push({ label: '', href: '' }); renderCurrentPage(); }
    function removeFooterLink(i) { config.footer.links.splice(i, 1); renderCurrentPage(); }
    function addNewsItem() { content.news.items.push({ date: '', title: '', url: '#' }); renderCurrentPage(); }
    function removeNewsItem(i) { content.news.items.splice(i, 1); renderCurrentPage(); }
    function addValueItem() { content.message.values.push({ titleEn: '', titleJa: '', catch: '', body: '' }); renderCurrentPage(); }
    function removeValueItem(i) { content.message.values.splice(i, 1); renderCurrentPage(); }
    function addMsgBtn() { content.message.buttons.push({ label: '', url: '' }); renderCurrentPage(); }
    function removeMsgBtn(i) { content.message.buttons.splice(i, 1); renderCurrentPage(); }
    function addServiceItem() { content.service.items.push({ title: '', image: '', body: '', url: '#', linkText: '詳細を見る' }); renderCurrentPage(); }
    function removeServiceItem(i) { content.service.items.splice(i, 1); renderCurrentPage(); }
    function addPhotoItem() { content.photo.images.push(''); renderCurrentPage(); }
    function removePhotoItem(i) { content.photo.images.splice(i, 1); renderCurrentPage(); }
    function addOfficeItem() { content.access.offices.push({ name: '', address: '', mapUrl: '', mapEmbed: '', isMain: false }); renderCurrentPage(); }
    function removeOfficeItem(i) { content.access.offices.splice(i, 1); renderCurrentPage(); }

    // ==========================================
    // Color field helper
    // ==========================================
    function colorField(label, key, value) {
      return `<div class="cms__field">
        <label class="cms__label">${label}</label>
        <div class="cms__color-group">
          <input class="cms__input cms__input--color" type="color" value="${value}" onchange="config.theme.${key}=this.value; this.nextElementSibling.value=this.value">
          <input class="cms__input cms__input--text" type="text" value="${value}" onchange="config.theme.${key}=this.value; this.previousElementSibling.value=this.value">
        </div>
      </div>`;
    }

    // ==========================================
    // Actions
    // ==========================================
    function saveData() {
      downloadJSON('config.json', config);
      setTimeout(() => downloadJSON('content.json', content), 300);
      showToast('JSONファイルをダウンロードしました！', 'success');
    }

    function resetData() {
      if (confirm('変更をリセットしますか？元のJSONファイルを再読み込みします。')) {
        init();
        showToast('リセットしました', 'success');
      }
    }

    function previewSite() {
      window.open('index.html', '_blank');
    }

    function downloadJSON(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `cms__toast cms__toast--${type} is-visible`;
      setTimeout(() => { toast.classList.remove('is-visible'); }, 3000);
    }

    // ==========================================
    // Utils
    // ==========================================
    function esc(str) {
      if (str == null) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Go!
    init();
  </script>
