<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="siteTitle">コーポレートサイト</title>
  <meta name="description" id="metaDesc" content="">
  <meta property="og:title" id="ogTitle" content="">
  <meta property="og:description" id="ogDesc" content="">
  <meta property="og:image" id="ogImage" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="/" class="header__logo" id="headerLogo">
        <span class="header__logo-mark"></span>
        <span class="header__logo-text">サイト名</span>
      </a>
      <nav class="header__nav" id="headerNav">
        <ul class="header__nav-list" id="navList"></ul>
        <a href="#" class="header__nav-recruit" id="navRecruit">
          <span>採用情報ページ</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
        </a>
      </nav>
      <div class="header__actions">
        <a href="tel:" class="header__phone" id="headerPhone">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          <span id="phoneNumber"></span>
        </a>
        <a href="#" class="header__cta" id="headerCta">
          <span>お問い合わせ</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
      <button class="header__hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="heroSection">
    <div class="hero__bg"></div>
    <div class="hero__noise"></div>
    <div class="hero__inner">
      <div class="hero__text">
        <p class="hero__label">CORPORATE SITE</p>
        <h1 class="hero__tagline" id="heroTagline"></h1>
        <div class="hero__tagline-line"></div>
        <a href="#" class="hero__cta" id="heroCta">
          <span>お問い合わせ</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
      <div class="hero__image-wrap">
        <div class="hero__image-frame">
          <img id="heroImage" src="" alt="メインビジュアル">
        </div>
        <div class="hero__image-deco"></div>
        <div class="hero__image-deco2"></div>
      </div>
    </div>
    <div class="hero__scroll">
      <span>Scroll</span>
      <div class="hero__scroll-bar"></div>
    </div>
  </section>

  <!-- NEWS -->
  <section class="section news" id="news">
    <div class="section__inner">
      <div class="section__header" data-anim>
        <div class="section__titles">
          <h2 class="section__en" id="newsTitleEn"></h2>
          <span class="section__ja" id="newsTitleJa"></span>
        </div>
        <a href="#" class="section__more" id="newsMore">
          <span>一覧へ</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
      <div class="news__list" id="newsList"></div>
    </div>
  </section>

  <!-- MESSAGE -->
  <section class="section message" id="message">
    <div class="section__inner">
      <div class="section__header section__header--center" data-anim>
        <div class="section__titles">
          <h2 class="section__en" id="messageTitleEn"></h2>
          <span class="section__ja" id="messageTitleJa"></span>
        </div>
      </div>
      <div class="message__content" data-anim>
        <div class="message__image">
          <img id="messageImage" src="" alt="">
        </div>
        <div class="message__text">
          <h3 class="message__heading" id="messageHeading"></h3>
          <div class="message__body" id="messageBody"></div>
        </div>
      </div>
      <div class="message__values" id="messageValues"></div>
      <div class="message__buttons" id="messageButtons" data-anim></div>
    </div>
  </section>

  <!-- SERVICE -->
  <section class="section service" id="service">
    <div class="section__inner">
      <div class="section__header section__header--center" data-anim>
        <div class="section__titles">
          <h2 class="section__en" id="serviceTitleEn"></h2>
          <span class="section__ja" id="serviceTitleJa"></span>
        </div>
      </div>
      <div class="service__grid" id="serviceGrid"></div>
    </div>
  </section>

  <!-- PHOTO -->
  <section class="section photo" id="photo">
    <div class="section__inner">
      <div class="section__header section__header--center" data-anim>
        <div class="section__titles">
          <h2 class="section__en" id="photoTitleEn"></h2>
          <span class="section__ja" id="photoTitleJa"></span>
        </div>
      </div>
      <div class="photo__grid" id="photoGrid"></div>
    </div>
  </section>

  <!-- ACCESS -->
  <section class="section access" id="access">
    <div class="section__inner">
      <div class="section__header section__header--center" data-anim>
        <div class="section__titles">
          <h2 class="section__en" id="accessTitleEn"></h2>
          <span class="section__ja" id="accessTitleJa"></span>
        </div>
      </div>
      <div class="access__main" id="accessMain"></div>
      <div class="access__grid" id="accessOffices"></div>
      <p class="access__note" id="accessNote" data-anim></p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer" id="footer">
    <div class="footer__inner">
      <div class="footer__top">
        <a href="/" class="footer__logo" id="footerLogo">サイト名</a>
        <div class="footer__links" id="footerLinks"></div>
      </div>
      <div class="footer__divider"></div>
      <div class="footer__bottom">
        <p class="footer__copyright" id="footerCopyright"></p>
      </div>
    </div>
  </footer>

  <!-- Side floating CTA -->
  <a href="#" class="side-cta" id="sideCta">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span>お問い合わせ</span>
  </a>

  <script src="main.js"></script>
</body>
</html>
